aid: swaggerhub
name: SwaggerHub
segments:
  - Documentation
description: >-
  SwaggerHub is SmartBear's enterprise collaborative API design and
  documentation platform built around the OpenAPI specification. It provides
  tools for designing, building, documenting, and consuming RESTful APIs,
  with support for OpenAPI 2.0, OpenAPI 3.0, OpenAPI 3.1, and AsyncAPI
  specifications.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - API Design
  - API Management
  - Documentation
  - OpenAPI
created: '2026-03-03'
modified: '2026-03-16'
url: https://raw.githubusercontent.com/api-evangelist/swaggerhub/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: swaggerhub:swaggerhub-registry-api
    name: SwaggerHub Registry API
    description: >-
      The SwaggerHub Registry API allows you to access, manage, and update
      your organization's APIs, domains, and projects. You can search the
      public API catalog and add and trigger API-level integrations. It
      provides programmatic access to SwaggerHub resources including APIs,
      domains, integrations, projects, and templates.
    humanURL: https://support.smartbear.com/swaggerhub/docs/en/swaggerhub-apis.html
    baseURL: https://api.swaggerhub.com
    tags:
      - API Management
      - API Registry
      - Documentation
      - OpenAPI
    properties:
      - type: Documentation
        url: https://support.smartbear.com/swaggerhub/docs/en/swaggerhub-apis.html
      - type: API Reference
        url: https://app.swaggerhub.com/apis-docs/swagger-hub/registry-api/
      - type: OpenAPI
        url: https://app.swaggerhub.com/apis/swagger-hub/registry-api
      - type: Postman Collection
        url: https://www.postman.com/api-evangelist/swaggerhub/documentation/1lsm5uz/swaggerhub-registry-api
  - aid: swaggerhub:swaggerhub-user-management-api
    name: SwaggerHub User Management API
    description: >-
      The SwaggerHub User Management API enables organizations to automate
      the provisioning of new users and teams. You can get information about
      organizations and their members, add and remove organization members,
      and change their roles in bulk. It also supports managing resource
      access permissions for users and teams.
    humanURL: https://support.smartbear.com/swaggerhub/docs/en/swaggerhub-apis/user-management-api.html
    baseURL: https://api.swaggerhub.com
    tags:
      - Access Control
      - Organizations
      - Teams
      - Users
    properties:
      - type: Documentation
        url: https://support.smartbear.com/swaggerhub/docs/en/swaggerhub-apis/user-management-api.html
      - type: API Reference
        url: https://app.swaggerhub.com/apis-docs/swagger-hub/user-management-api
